{% extends 'base.html' %}

{% block title %}Вход | MedDiagnostic{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card p-4 auth-card">
                    <h1 class="mb-4 text-center">Вход в аккаунт</h1>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Имя пользователя</label>
                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                id="id_username"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Пароль</label>
                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                id="id_password"
                                required
                            >
                        </div>

                        {% if form.errors %}
                            <div class="alert alert-danger">
                                Неверное имя пользователя или пароль.
                            </div>
                        {% endif %}

                        <button type="submit" class="btn btn-primary w-100">
                            Войти
                        </button>
                    </form>

                    <p class="text-center mt-3 mb-0 login-links">
                        Нет аккаунта?
                        <a href="{% url 'users:register' %}">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
